name: ImmortalWrt Permanent Locked Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download ImageBuilder
        run: |
          wget https://downloads.immortalwrt.org/releases/24.10.0/targets/mvebu/cortexa9/immortalwrt-imagebuilder-24.10.0-mvebu-cortexa9.Linux-x86_64.tar.zst
          tar --use-compress-program=unzstd -xvf immortalwrt-imagebuilder-24.10.0-mvebu-cortexa9.Linux-x86_64.tar.zst

      - name: Build Permanent Locked Firmware
        run: |
          cd immortalwrt-imagebuilder-24.10.0-mvebu-cortexa9.Linux-x86_64

          mkdir -p files/etc/uci-defaults
          mkdir -p files/etc/dropbear

          # SSH key
          echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPGOKDN9Tk10N0cjm+orIwAgf1x1fn5HulNMhHWSb5BD u0_a395@localhost" > files/etc/dropbear/authorized_keys

          # Permanent configuration (runs after reset too)
          echo "uci set system.@system[0].hostname='NGU-NOOH-TIKTOK'" > files/etc/uci-defaults/99-custom
          echo "uci set network.lan.ipaddr='10.99.0.1'" >> files/etc/uci-defaults/99-custom
          echo "uci set network.lan.netmask='255.255.255.0'" >> files/etc/uci-defaults/99-custom
          echo "uci set dropbear.@dropbear[0].PasswordAuth='off'" >> files/etc/uci-defaults/99-custom
          echo "uci set dropbear.@dropbear[0].RootPasswordAuth='off'" >> files/etc/uci-defaults/99-custom
          echo "uci commit" >> files/etc/uci-defaults/99-custom
          echo "exit 0" >> files/etc/uci-defaults/99-custom

          chmod +x files/etc/uci-defaults/99-custom

          make image PROFILE=linksys_wrt1900acs PACKAGES="\
          collectd-mod-sqm \
          sqm-scripts \
          luci-app-sqm \
          luci-theme-argon \
          luci-app-argon-config \
          node-argon2 \
          kmod-ifb \
          kmod-sched-cake \
          kmod-sched-ctinfo \
          kmod-sched-core \
          kmod-sched-connmark \
          luci-app-cpufreq \
          luci-app-cpulimit \
          luci-app-irqbalance \
          -luci-app-package-manager \
          -luci-app-attendedsysupgrade \
          -luci-app-advanced-reboot \
          -luci-mod-system"

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-Permanent-Locked
          path: immortalwrt-imagebuilder-24.10.0-mvebu-cortexa9.Linux-x86_64/bin/targets/
