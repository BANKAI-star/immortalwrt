name: ImmortalWrt Custom Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download ImageBuilder
        run: |
          wget https://downloads.immortalwrt.org/releases/24.10.0/targets/mvebu/cortexa9/immortalwrt-imagebuilder-24.10.0-mvebu-cortexa9.Linux-x86_64.tar.zst
          tar --use-compress-program=unzstd -xvf immortalwrt-imagebuilder-24.10.0-mvebu-cortexa9.Linux-x86_64.tar.zst

      - name: Build Firmware
        run: |
          cd immortalwrt-imagebuilder-24.10.0-mvebu-cortexa9.Linux-x86_64

          mkdir -p files/etc/uci-defaults
          mkdir -p files/etc/dropbear

          cat > files/etc/uci-defaults/99-custom << 'EOF'
          #!/bin/sh
          uci set system.@system[0].hostname='NGU-NOOH-TIKTOK'
          uci set network.lan.ipaddr='10.99.0.1'
          uci set network.lan.netmask='255.255.255.0'
          uci set dropbear.@dropbear[0].PasswordAuth='off'
          uci set dropbear.@dropbear[0].RootPasswordAuth='off'
          uci commit
          exit 0
          EOF

          chmod +x files/etc/uci-defaults/99-custom
          sync

          make image PROFILE=linksys_wrt1900acs PACKAGES="luci luci-theme-argon luci-app-argon-config luci-app-sqm sqm-scripts collectd-mod-sqm node-argon2 kmod-ifb luci-app-cpufreq luci-app-cpulimit luci-app-irqbalance kmod-sched-cake kmod-sched-ctinfo kmod-sched-core kmod-sched-connmark"

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-Firmware
          path: immortalwrt-imagebuilder-24.10.0-mvebu-cortexa9.Linux-x86_64/bin/targets/
