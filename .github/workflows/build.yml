name: Build ImmortalWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y \
        build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git \
        libncurses5-dev libssl-dev python3 \
        python3-distutils rsync unzip zlib1g-dev \
        file wget curl

    - name: Clone ImmortalWrt source
      run: |
        git clone https://github.com/immortalwrt/immortalwrt

    - name: Copy overlay files
      run: |
        cp -r files immortalwrt/

    - name: Cache downloads
      uses: actions/cache@v4
      with:
        path: immortalwrt/dl
        key: immortalwrt-cache

    - name: Update feeds
      run: |
        cd immortalwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load config
      run: |
        cp .config immortalwrt/.config

    - name: Prepare config
      run: |
        cd immortalwrt
        make defconfig

    - name: Download sources
      run: |
        cd immortalwrt
        make download -j8

    - name: Build firmware
      run: |
        cd immortalwrt
        make -j$(nproc)

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: immortalwrt/bin/targets/

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: firmware-${{ github.run_number }}
        name: ImmortalWrt Build ${{ github.run_number }}
        files: immortalwrt/bin/targets/**/*

      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
