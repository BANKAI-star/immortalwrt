name: ImmortalWrt Permanent Locked Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download ImageBuilder
        run: |
          wget https://downloads.immortalwrt.org/releases/24.10.0/targets/mvebu/cortexa9/immortalwrt-imagebuilder-24.10.0-mvebu-cortexa9.Linux-x86_64.tar.zst
          tar --use-compress-program=unzstd -xvf immortalwrt-imagebuilder-24.10.0-mvebu-cortexa9.Linux-x86_64.tar.zst

      - name: Build Permanent Locked Firmware
        run: |
          cd immortalwrt-imagebuilder-24.10.0-mvebu-cortexa9.Linux-x86_64

          mkdir -p files/etc/config
          mkdir -p files/etc/dropbear

          echo "config system" > files/etc/config/system
          echo "	option hostname 'NGU-NOOH-TIKTOK'" >> files/etc/config/system

          echo "config interface 'lan'" > files/etc/config/network
          echo "	option device 'br-lan'" >> files/etc/config/network
          echo "	option proto 'static'" >> files/etc/config/network
          echo "	option ipaddr '10.99.0.1'" >> files/etc/config/network
          echo "	option netmask '255.255.255.0'" >> files/etc/config/network

          echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPGOKDN9Tk10N0cjm+orIwAgf1x1fn5HulNMhHWSb5BD u0_a395@localhost" > files/etc/dropbear/authorized_keys

          echo "config dropbear" > files/etc/config/dropbear
          echo "	option PasswordAuth 'off'" >> files/etc/config/dropbear
          echo "	option RootPasswordAuth 'off'" >> files/etc/config/dropbear

          make image PROFILE=linksys_wrt1900acs PACKAGES="collectd-mod-sqm sqm-scripts luci-theme-argon luci-app-argon-config node-argon2 kmod-ifb kmod-sched-cake kmod-sched-ctinfo kmod-sched-core kmod-sched-connmark luci-app-cpufreq luci-app-cpulimit luci-app-irqbalance -luci-app-package-manager -luci-app-attendedsysupgrade -luci-app-advanced-reboot -luci-mod-system"

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-Permanent-Locked
          path: immortalwrt-imagebuilder-24.10.0-mvebu-cortexa9.Linux-x86_64/bin/targets/
