name: ImmortalWrt Custom Build

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  - name: Download ImageBuilder
    run: |
      wget https://downloads.immortalwrt.org/releases/24.10.0/targets/mvebu/cortexa9/immortalwrt-imagebuilder-24.10.0-mvebu-cortexa9.Linux-x86_64.tar.zst
      tar --use-compress-program=unzstd -xvf immortalwrt-imagebuilder-24.10.0-mvebu-cortexa9.Linux-x86_64.tar.zst

  - name: Build Firmware
    run: |
      cd immortalwrt-imagebuilder-24.10.0-mvebu-cortexa9.Linux-x86_64

      mkdir -p files/etc/config

      cat << "EOF" > files/etc/config/system
      config system
          option hostname 'NGU-NOOH-TIKTOK'
          option timezone 'UTC'
      EOF

      cat << "EOF" > files/etc/config/network
      config interface 'loopback'
          option device 'lo'
          option proto 'static'
          option ipaddr '127.0.0.1'
          option netmask '255.0.0.0'

      config interface 'lan'
          option device 'br-lan'
          option proto 'static'
          option ipaddr '10.99.0.1'
          option netmask '255.255.255.0'
      EOF

      make image PROFILE=linksys_wrt1900acs PACKAGES="luci luci-base luci-mod-admin-full luci-theme-argon luci-app-argon-config luci-app-sqm sqm-scripts collectd-mod-sqm kmod-ifb kmod-sched-cake kmod-sched-core kmod-sched-ctinfo kmod-sched-connmark luci-app-cpufreq luci-app-cpulimit luci-app-irqbalance irqbalance kmod-irqbypass luci-app-statistics collectd collectd-mod-cpu collectd-mod-interface collectd-mod-load collectd-mod-memory collectd-mod-network collectd-mod-rrdtool luci-app-commands nano htop curl wget ca-bundle"

  - name: Upload Firmware
    uses: actions/upload-artifact@v4
    with:
      name: ImmortalWrt-Firmware
      path: immortalwrt-imagebuilder-24.10.0-mvebu-cortexa9.Linux-x86_64/bin/targets/
